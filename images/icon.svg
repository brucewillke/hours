<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="currentColor" opacity="0.08">
  <!-- Icon frame -->
  <rect x="10" y="5" width="80" height="110" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Halo -->
  <circle cx="50" cy="35" r="20" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Cross in halo -->
  <line x1="50" y1="15" x2="50" y2="55" stroke="currentColor" stroke-width="2"/>
  <line x1="30" y1="35" x2="70" y2="35" stroke="currentColor" stroke-width="2"/>
  <!-- Face (simplified) -->
  <circle cx="50" cy="35" r="12"/>
  <!-- Shoulders/body -->
  <path d="M30 55 Q50 50 70 55 L75 100 Q50 95 25 100 Z"/>
  <!-- Book -->
  <rect x="55" y="65" width="15" height="20" rx="1" fill="none" stroke="currentColor" stroke-width="1"/>
  <!-- Blessing hand -->
  <circle cx="35" cy="70" r="5"/>
</svg>
